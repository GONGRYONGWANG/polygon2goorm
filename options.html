<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="options.css">
  <title>Polygon2Goorm 설정</title>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">Polygon2Goorm</p>
      <h1>리소스 제한 보정</h1>
      <p class="hint">구름에 생성할 언어별 시간/메모리 제한을 BOJ식 보정값으로 계산합니다. 최종값은 원본 제한에 배율을 곱한 뒤 추가값을 더합니다.</p>
    </header>

    <section class="toolbar" aria-label="설정 작업">
      <button id="saveButton" type="button" class="primary">저장</button>
      <button id="resetButton" type="button" class="secondary">BOJ 기본값으로 초기화</button>
      <button id="addOneSecondButton" type="button" class="secondary">모든 언어 시간 +1초</button>
      <button id="clearAdditionsButton" type="button" class="secondary">추가값 0으로</button>
      <span id="status" aria-live="polite"></span>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>언어</th>
            <th>시간 배율</th>
            <th>시간 추가(초)</th>
            <th>메모리 배율</th>
            <th>메모리 추가(MB)</th>
          </tr>
        </thead>
        <tbody id="limitRows"></tbody>
      </table>
    </section>
  </main>

  <script type="module" src="options.js"></script>
</body>
</html>
